<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playground — dok</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .playground        { display: flex; gap: 0; height: calc(100vh - 120px); }
    .pane              { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .pane-header       { background: #1F3864; color: white; padding: .5rem 1rem;
                         font-size: .85rem; font-weight: 600; display: flex;
                         align-items: center; justify-content: space-between; }
    .pane-header span  { opacity: .7; font-weight: 400; font-size: .8rem; }
    textarea           { flex: 1; resize: none; border: none; outline: none;
                         padding: 1.2rem; font-family: 'Courier New', monospace;
                         font-size: .88rem; line-height: 1.6; background: #0d1117;
                         color: #c9d1d9; border-right: 2px solid #30363d; }
    .preview-pane      { flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
                         background: #fff; border-left: 2px solid #e0e0e0; }
    .error-box         { background: #fff3cd; border: 1px solid #ffc107;
                         border-radius: 4px; padding: 1rem; margin-bottom: 1rem;
                         font-family: monospace; font-size: .85rem;
                         color: #856404; white-space: pre-wrap; }
    .compile-btn       { background: gold; color: #1F3864; border: none;
                         padding: .35rem .9rem; border-radius: 4px; cursor: pointer;
                         font-weight: 700; font-size: .85rem; }
    .compile-btn:hover { background: #e6c200; }
    .status            { font-size: .78rem; padding: 0 1rem; }
    .status.ok         { color: #70AD47; }
    .status.err        { color: #e05252; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">dok</a>
      <span class="logo-sub">document markup language</span>
      <nav>
        <a href="/">Home</a>
        <a href="/docs">Docs</a>
        <a href="/examples">Examples</a>
        <a href="/playground" class="nav-active">Playground</a>
        <a href="https://github.com/mahmoudxyz/dok" target="_blank" class="nav-github">GitHub ↗</a>
      </nav>
    </div>
  </header>

  <div class="playground">

    <!-- Editor pane -->
    <div class="pane">
      <div class="pane-header">
        <div>editor <span>.dok source</span></div>
        <div style="display:flex;gap:.6rem;align-items:center">
          <span class="status" id="status"></span>
          <button class="compile-btn" onclick="compile()">▶ Run</button>
        </div>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Write dok here...">doc {
  page {

    banner(fill: #1F3864, accent: gold, color: white) {
      center { bold(size: 18) { "Hello from dok!" } }
    }

    space(size: 12)

    p {
      "This is "
      bold { "bold" }
      ", "
      italic { "italic" }
      ", and "
      bold(color: navy) { "bold navy" }
      "."
    }

    space(size: 8)

    rtl {
      p { bold(color: #1F3864) { "مرحباً بالعالم" } }
    }

    space(size: 8)

    table(border: true, striped: true) {
      tr { th { "Feature" }    th { "Status" } }
      tr { td { "RTL" }        td { bold(color: green) { "✓ Native" } } }
      tr { td { "Zero deps" }  td { bold(color: green) { "✓ Yes"    } } }
      tr { td { "AI-ready" }   td { bold(color: green) { "✓ Yes"    } } }
    }

  }
}</textarea>
    </div>

    <!-- Preview pane -->
    <div class="pane">
      <div class="pane-header">
        preview <span>HTML output</span>
      </div>
      <div class="preview-pane" id="preview">
        <p style="color:#aaa;font-style:italic">
          Press ▶ Run to see the preview.
        </p>
      </div>
    </div>

  </div>

  <script>
    const editor  = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const status  = document.getElementById("status");

    let debounce;

    // Auto-compile on type after 600ms pause
    editor.addEventListener("input", () => {
      clearTimeout(debounce);
      status.textContent = "…";
      status.className = "status";
      debounce = setTimeout(compile, 600);
    });

    async function compile() {
      const source = editor.value;
      status.textContent = "compiling…";
      status.className = "status";

      try {
        const res  = await fetch("/api/preview", {
          method:  "POST",
          headers: { "Content-Type": "text/plain" },
          body:    source,
        });

        if (res.ok) {
          const html = await res.text();
          preview.innerHTML = html;
          status.textContent = "✓ ok";
          status.className = "status ok";
        } else {
          const err = await res.text();
          preview.innerHTML = `<div class="error-box">${escape(err)}</div>`;
          status.textContent = "✗ error";
          status.className = "status err";
        }
      } catch (e) {
        preview.innerHTML = `<div class="error-box">Server error: ${e.message}</div>`;
        status.textContent = "✗ server error";
        status.className = "status err";
      }
    }

    function escape(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Compile on load
    compile();

    // Tab key inserts spaces instead of jumping focus
    editor.addEventListener("keydown", e => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = editor.selectionStart;
        const v = editor.value;
        editor.value = v.slice(0, s) + "  " + v.slice(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = s + 2;
      }
    });
  </script>

</body>
</html>
